server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: test-service
          uri: http://localhost:8081
          predicates:
            - Path=/test/**

        - id: wedding-service
          uri: lb://WEDDING-SERVICE
          predicates:
            - Path=/wedding/**

        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/booking/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka